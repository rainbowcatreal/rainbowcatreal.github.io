<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #333333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .section {
            margin-bottom: 20px;
        }

        .button {
            display: inline-block;
            padding: 10px 15px;
            background-color: #007BFF;
            color: #ffffff;
            border: none;
            cursor: pointer;
        }

        .button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Welcome</h1>
            <p>This is a simple AI-generated HTML example.</p>
        </div>

        <div class="section">
            <h2>About</h2>
            <p>This section contains placeholder text describing the purpose of the page.</p>
        </div>

        <div class="section">
            <h2>Actions</h2>
            <button class="button" onclick="handleClick()">Click Me</button>
        </div>
    </div>

    <script>
        function handleClick() {
            alert("Button clicked");
        }
    </script>

</body>
          </html>
